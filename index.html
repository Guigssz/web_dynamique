<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageVista — Planification de Voyages</title>

    <!-- Feuilles de style -->
    <link rel="stylesheet" href="./frontend/css/global.css">
    <link rel="stylesheet" href="./frontend/css/layout.css">
    <link rel="stylesheet" href="./frontend/css/destinations.css">

    <!-- React 18 + Babel (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- ════════════════════════════════════════════════════════
         ORDRE DE CHARGEMENT :
         1. Contextes (AuthContext)
         2. Composants réutilisables (Navbar, Sidebar, FiltresPanel, ConnexionSidePanel)
         3. Pages (Explorer, Hébergements, Transports, Activités, Itinéraire)
         4. App principale (routeur + render)
         ════════════════════════════════════════════════════════ -->

    <!-- 1. Contextes -->
    <script type="text/babel" src="./frontend/context/AuthContext.js"></script>

    <!-- 2. Composants -->
    <script type="text/babel" src="./frontend/components/Navbar.js"></script>
    <script type="text/babel" src="./frontend/components/Sidebar.js"></script>
    <script type="text/babel" src="./frontend/components/FiltresPanel.js"></script>
    <script type="text/babel" src="./frontend/components/ConnexionSidePanel.js"></script>

    <!-- 3. Pages -->
    <script type="text/babel" src="./frontend/pages/ExplorerPage.js"></script>
    <script type="text/babel" src="./frontend/pages/HebergementsPage.js"></script>
    <script type="text/babel" src="./frontend/pages/TransportsPage.js"></script>
    <script type="text/babel" src="./frontend/pages/ActivitesPage.js"></script>
    <script type="text/babel" src="./frontend/pages/ItinerairePage.js"></script>
    <script type="text/babel" src="./frontend/pages/ProfilePage.js"></script>
    <script type="text/babel" src="./frontend/pages/AdminPage.js"></script>
    <script type="text/babel" src="./frontend/pages/NotificationsPage.js"></script>
    <script type="text/babel" src="./frontend/pages/ReservationsPage.js"></script>

    <!-- 4. Application principale -->
    <script type="text/babel" src="./frontend/App.js"></script>
</body>
</html>
